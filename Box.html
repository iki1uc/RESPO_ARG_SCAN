<div class="box">
    <h2>RAW6D – Scan‑Ausgabe</h2>
    <pre id="scan-output">Noch keine Datei geladen.</pre>
</div>

<script>
async function loadR6D(path) {
    try {
        const response = await fetch(path);
        const buffer = await response.arrayBuffer();
        const bytes = new Uint8Array(buffer);

        // Hex-Dump erzeugen
        let hex = "";
        for (let i = 0; i < bytes.length; i++) {
            hex += bytes[i].toString(16).padStart(2, "0");
        }

        const output = {
            file: path,
            size: bytes.length + " bytes",
            header: null,
            frame: null,
            meta: null,
            axes: null,
            respo: null,
            missing: []
        };

        // HEADER-Signatur
        if (hex.includes("565f5241573644")) { // "V_RAW6D" in Hex
            output.header = "Header-Signatur erkannt";
        } else {
            output.missing.push("Header-Signatur fehlt");
        }

        // FRAME-Signatur
        if (hex.includes("6672616d65")) { // "frame"
            output.frame = "Frame-Signatur erkannt";
        } else {
            output.missing.push("Frame-Signatur fehlt");
        }

        // META-Signatur
        if (hex.includes("6d657461")) { // "meta"
            output.meta = "Meta-Signatur erkannt";
        } else {
            output.missing.push("Meta-Signatur fehlt");
        }

        // AXES-Signatur
        if (hex.includes("595854") || hex.includes("424854")) { // YXT / BHT
            output.axes = "Achsen-Signatur erkannt";
        } else {
            output.missing.push("Achsen-Signatur fehlt");
        }

        // RESPO-Signatur
        if (hex.includes("564543544f52") || hex.includes("54454348") || hex.includes("4158494f4d")) {
            output.respo = "Respo-Signatur erkannt";
        } else {
            output.missing.push("Respo-Signatur fehlt");
        }

        document.getElementById("scan-output").textContent =
            JSON.stringify(output, null, 2);

    } catch (e) {
        document.getElementById("scan-output").textContent =
            "Fehler beim Laden der Datei.";
    }
}

// Beispiel: eine deiner Dateien laden
loadR6D("RAW6D/6d3.r6d");
</script>
